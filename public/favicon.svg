<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Face outline -->
  <circle cx="50" cy="50" r="40" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Left eye (happy) -->
  <ellipse cx="38" cy="45" rx="4" ry="6" fill="#1f2937"/>
  
  <!-- Right eye (happy) -->
  <ellipse cx="62" cy="45" rx="4" ry="6" fill="#1f2937"/>
  
  <!-- Smile -->
  <path d="M 35 58 Q 50 68 65 58" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Emotion indicator dots (representing different emotions) -->
  <circle cx="30" cy="30" r="3" fill="#ef4444" opacity="0.6"/>
  <circle cx="70" cy="30" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="50" cy="25" r="3" fill="#8b5cf6" opacity="0.6"/>
</svg>
