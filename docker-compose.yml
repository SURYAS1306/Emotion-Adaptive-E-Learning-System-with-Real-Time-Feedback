version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - VITE_EMOTION_WS_URL=ws://localhost:8000/ws/emotion
    ports:
      - "4173:80"
    depends_on:
      - backend
    restart: unless-stopped

